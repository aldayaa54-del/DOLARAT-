<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Register</h1>
    <form action="/submit_registration" method="POST">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        
        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required><br><br>
        
        <label for="min_deposit">Minimum Deposit ($10):</label>
        <input type="number" id="min_deposit" name="min_deposit" min="10" required><br><br>
        
        <label for="referral_code">Referral Code:</label>
        <input type="text" id="referral_code" name="referral_code"><br><br>
        
        <input type="checkbox" id="terms" name="terms" required>
        <label for="terms">I accept the terms and conditions</label><br><br>
        
        <input type="submit" value="Register">
    </form>
</body>
</html>
